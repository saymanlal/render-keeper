name: Keep Render Alive

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping URLs
        run: |
          while IFS= read -r url
          do
            echo "Pinging $url"
            curl -s -o /dev/null "$url?t=$(date +%s)"
          done < urls.txt